name: 📦 Publish

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta, canary, backport, etc.)'
        required: false
        default: 'latest'
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions:
  contents: write
  id-token: write


jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@71ddb13e74d4a3fc87ae2780daffd477c16b9e24 # main
    with:
      debug: ${{ inputs.debug }}
      dist-tag: ${{ inputs.dist-tag }}
      package-name: '@socketregistry/packageurl-js'
      publish-script: 'publish:ci'
      setup-script: 'ci:validate'
      use-trusted-publishing: true
