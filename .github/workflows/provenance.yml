name: 📦 Publish

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta, canary, backport, etc.)'
        required: false
        default: 'latest'
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'
      publish-without-sfw:
        description: 'Publish directly to npm, bypassing Socket firewall shims'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write


jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@bab1dc8adc59a21c04fa73d3dd4a333c12e2ca9b # main
    with:
      debug: ${{ inputs.debug }}
      dist-tag: ${{ inputs.dist-tag }}
      package-name: '@socketregistry/packageurl-js'
      publish-script: 'publish:ci'
      publish-without-sfw: ${{ inputs.publish-without-sfw }}
      setup-script: 'ci:validate'
      use-trusted-publishing: true
    secrets:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}
