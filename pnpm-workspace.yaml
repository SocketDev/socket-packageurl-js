resolutionMode: highest
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'compromise@14.15.0'

# Catalog: shared dependency versions referenced as "catalog:" in
# package.json. Currently only @socketsecurity/lib needs a catalog
# entry — the .claude/hooks/check-new-deps hook references it via
# "catalog:" so its manifest stays in lockstep with the root.
catalog:
  '@anthropic-ai/claude-code': 2.1.201
  '@redwoodjs/agent-ci': 0.17.1
  '@sinclair/typebox': 0.34.50
  '@socketregistry/packageurl-js': 1.4.2
  '@socketregistry/packageurl-js-stable': npm:@socketregistry/packageurl-js@1.4.2
  '@socketsecurity/lib': 6.0.10
  '@socketsecurity/lib-stable': npm:@socketsecurity/lib@6.0.10
  '@socketsecurity/registry': 2.0.2
  '@socketsecurity/registry-stable': npm:@socketsecurity/registry@2.0.2
  '@socketsecurity/sdk': 4.0.1
  '@socketsecurity/sdk-stable': npm:@socketsecurity/sdk@4.0.1
  '@types/mdast': 4.0.4
  '@types/node': 26.1.1
  '@types/semver': 7.7.1
  '@types/shell-quote': 1.7.5
  '@typescript/native-preview': 7.0.0-dev.20260510.1
  '@ultrathink/acorn.wasm': npm:@ultrathink/acorn-wasm@0.0.1
  '@vitest/coverage-v8': 4.1.10
  '@vitest/ui': 4.1.10
  'c8': 11.0.0
  'chrome-devtools-mcp': 1.5.0
  'compromise': 14.15.1
  'dtu-github-actions': 0.17.1
  'ecc-agentshield': 1.4.0
  'esbuild': 0.25.12
  'magic-string': 1.0.0
  'markdownlint-cli2': 0.23.0
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'neosanitize': 0.3.0
  'nock': 15.0.0
  'npm-run-all2': 9.0.2
  'oxfmt': 0.58.0
  'oxlint': 1.73.0
  # Fleet bundler. Single-sourced to match the wheelhouse catalog pin +
  # the rolldown vite 8.0.14 bundles natively.
  'playwright-core': 1.61.1
  'portless': 0.15.4
  'regjsparser': 0.13.2
  'rolldown': 1.1.4
  'semver': 7.8.5
  'shell-quote': 1.10.0
  'taze': 19.14.1
  # vite 8.0.14 swaps esbuild → rolldown natively (bundles rolldown
  # 1.0.2), so the override below removes esbuild from the install tree.
  'typescript': 7.0.2
  'vite': 8.1.0
  'vitest': 4.1.10

# Register .claude/hooks/* and the oxlint-plugin rule packages as
# workspace packages so taze (run via `pnpm run update`) sees and bumps
# their package.json manifests alongside the root, and so pnpm installs
# each rule's own dependencies (e.g. regjsparser for require-regex-comment;
# without the glob the rule's `require` throws and the whole socket/ plugin
# fails to load). Keeps hook + rule deps in lockstep with the main tree.
packages:
  - .config/fleet/oxlint-plugin
  - .config/fleet/oxlint-plugin/fleet/*
  - '.claude/hooks/fleet/*'

allowBuilds:
  # puppeteer ships a postinstall that downloads Chromium (~300MB).
  # Required because `pnpm tour:build` (the GH Pages workflow) renders
  # mermaid diagrams via puppeteer/Chromium. Disabling it would break
  # the Tour pipeline. CI + Val Town pay the download cost as the
  # uniform-install tradeoff for keeping all workflows symmetric.
  cpu-features: false
  esbuild: true
  protobufjs: false
  puppeteer: true
  ssh2: false

# Refuse to run if the pnpm version on PATH differs from the packageManager
# field in package.json. Our setup action pins pnpm via external-tools.json;
# any drift should fail fast, not silently auto-download via @pnpm/exe
# (which in rc.5 leaves a placeholder launcher that errors at runtime).
pmOnFail: warn

# Force every consumer of Socket's own packages to resolve through the
# catalog-pinned published versions. The `catalog:` form rewrites
# `workspace:*`, `^x.y.z`, and bare-version specs alike to the version
# in the default `catalog:` block above. This defeats accidental
# local-checkout resolution when a sibling repo is on disk.
overrides:
  # Fleet-canonical overrides (managed by socket-wheelhouse sync; do not edit).
  '@socketregistry/packageurl-js': 'catalog:'
  '@socketsecurity/lib': 'catalog:'
  '@socketsecurity/registry': 'catalog:'
  '@socketsecurity/sdk': 'catalog:'
  'chalk@>=5': '5.6.2'
  'es-define-property': 'npm:@socketregistry/es-define-property@1.0.7'
  'es-set-tostringtag': 'npm:@socketregistry/es-set-tostringtag@1.0.10'
  'function-bind': 'npm:@socketregistry/function-bind@1.0.7'
  'glob': '13.0.6'
  'gopd': 'npm:@socketregistry/gopd@1.0.7'
  'has-symbols': 'npm:@socketregistry/has-symbols@1.0.7'
  'has-tostringtag': 'npm:@socketregistry/has-tostringtag@1.0.7'
  'hasown': 'npm:@socketregistry/hasown@1.0.7'
  'iconv-lite': '0.7.2'
  'isexe@>=3': '4.0.0'
  'lru-cache@>=10': '11.3.6'
  'magic-string': '1.0.0'
  'mime-db': '1.54.0'
  'mime-types@>=3': '3.0.2'
  'minipass@>=4': '7.1.3'
  'safe-buffer': 'npm:@socketregistry/safe-buffer@1.0.9'
  'safer-buffer': 'npm:@socketregistry/safer-buffer@1.0.10'
  'semver@>=5.0.0 <7.6.0': '7.8.1'
  'side-channel': 'npm:@socketregistry/side-channel@1.0.10'
  'ssri@>=12': '13.0.1'
  'string-width@>=5': '8.1.0'
  'update-notifier@>=4.0.0': '7.3.1'
  'uuid': '11.1.1'
  'which': '7.0.0'
  'wrap-ansi@>=8': '9.0.2'
  'yaml@2': '2.9.0'

  # Repo-specific overrides below.
  'ip-address': '10.1.1'
  'mermaid': '11.15.0'
  'picomatch@4': '4.0.4'
  'postcss': '8.5.10'
  'vite': 'catalog:'
  'which@>=4': '7.0.0'

# Wait 7 days (10080 minutes) before installing newly published packages.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  # `@rolldown/pluginutils` versions independently of vite's bundled native
  # rolldown release; the per-platform bindings share its pin.
  # Listed explicitly per the fleet "no scope globs in soak excludes" rule.
  - '@rolldown/pluginutils'
  - 'sfw'
  - '@stuie/*'
  - '@ultrathink/*'
  - '@socketoverride/*'
  # pnpm 11.5.3 security release (binary signature + Node SHASUMS OpenPGP
  # verification) and its pacquet install engine, both published the day they
  # were adopted. Soak-bypassed to land the security fix; drop these once the
  # 7-day window clears.
  - 'socket'
  - '@sdxgen/*'
  - 'sdxgen'
  - 'stuie'
  # published: 2026-07-14 | removable: 2026-07-21
  - '@redwoodjs/agent-ci@0.17.1'
  # published: 2026-07-14 | removable: 2026-07-21
  - 'dtu-github-actions@0.17.1'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'magic-string@1.0.0'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'portless@0.15.4'

# Refuse transitive dependencies declared via git/tarball/local-tarball
# specs — an npm package shouldn't be allowed to drag in a git URL we
# don't control (bypasses npm registry validation, no provenance, no
# soak window). Direct git deps are still allowed (the test suite at
# pnpm/pkg-manager/core/test/install/blockExoticSubdeps.ts confirms
# this). pnpm's current default is `false`; declared explicitly so a
# future flip can't silently change install behavior.
blockExoticSubdeps: true
confirmModulesPurge: false
managePackageManagerVersions: false

# Auto-install missing peer deps (pnpm default). Declared explicitly
# so a future default flip can't silently change install behavior.
autoInstallPeers: true

# Pin pnpm's default of running root pre/post lifecycle scripts.
enablePrePostScripts: true

# Pin exact versions on `pnpm add`. Catalog and overrides should
# also be exact pins (5.24.0, not ^5.24.0).
saveExact: true

# Hold nock at v14 due to breaking changes in v15 that conflict with the test suite.
catalogShadowIgnore:
  # nock 15 (msw-interceptors rewrite) breaks member mock suites — hold until the fleet #339 migration.
  - 'nock'

# Opt in to pnpm's Rust install engine (pacquet). pnpm 11.5.3+ fetches and
# signature-verifies this config dependency; the integrity is inlined here (and
# mirrored in pnpm-lock.yaml) so a tampered registry copy is rejected.
configDependencies:
  '@pnpm/pacquet': 0.11.2+sha512-MjsAWpW5K1xOaaspquMhk5j9sjpADLH3c3hxq07VVZwS9uu1W6gzMBHxlhy1NX/+ZacqMhfyScvgQqymCc1znQ==
